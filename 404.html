<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="dark">
  <meta name="theme-color" content="#080c14">
  <title>404 — Page not found | Abhishek Aryan</title>
  <meta name="description" content="The page you're looking for doesn't exist. Head back to the homepage.">
  <meta name="robots" content="noindex, nofollow">
  <link rel="canonical" href="https://cybersnake223.github.io">
  <link rel="icon" type="image/png" href="https://github.com/Cybersnake223.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preload" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@300;400;500;600&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'">
  <noscript><link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"></noscript>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
    }
    :root {
      --bg:#080c14; --bg1:#0c1220; --bg2:#111928;
      --border:rgba(255,255,255,0.07); --border2:rgba(255,255,255,0.13);
      --text:#e2eaf6; --muted:#7a90b2; --faint:#5575a0;
      --teal:#3ecfcf; --teal2:rgba(62,207,207,0.12); --teal3:rgba(62,207,207,0.25);
      --gold:#c9a84c;
      --mono:'JetBrains Mono',monospace; --sans:'Inter',system-ui,sans-serif;
      --r-sm:6px; --r-md:10px; --r-lg:16px;
      --sh-md:0 4px 20px rgba(0,0,0,0.5);
      --t-xs:clamp(0.75rem,0.7rem+0.2vw,0.8rem); --t-sm:clamp(0.82rem,0.8rem+0.2vw,0.9rem);
      --t-lg:clamp(1.1rem,1rem+0.5vw,1.3rem);
      --t-3xl:clamp(3rem,1rem+7vw,6rem);
    }
    body {
      font-family:var(--sans); font-size:var(--t-sm); color:var(--muted);
      background:var(--bg); min-height:100dvh; display:flex;
      flex-direction:column; align-items:center; justify-content:center;
      text-align:center; padding:2rem; overflow-x:hidden;
      -webkit-font-smoothing:antialiased;
    }
    body::before {
      content:''; position:fixed; inset:0; z-index:-1; pointer-events:none; opacity:0.022;
      background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size:256px 256px;
    }
    body::after {
      content:''; position:fixed; inset:0; z-index:-1; pointer-events:none;
      background:
        radial-gradient(ellipse 80% 60% at 20% 10%, rgba(62,207,207,0.04) 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 80% 90%, rgba(201,168,76,0.03) 0%, transparent 60%);
      animation: meshDrift 18s ease-in-out infinite alternate;
    }
    @keyframes meshDrift {
      0%   { opacity:1; transform:scale(1) translate(0,0); }
      33%  { transform:scale(1.04) translate(1%,-1%); }
      66%  { transform:scale(0.97) translate(-1%,1.5%); }
      100% { opacity:0.7; transform:scale(1.02) translate(0.5%,-0.5%); }
    }
    .code {
      font-family:var(--mono); font-size:var(--t-3xl); font-weight:700;
      line-height:1; color:var(--teal); margin-bottom:0.2em;
      letter-spacing:-0.04em;
    }
    .code span { color:var(--faint); }
    h1 {
      font-family:var(--mono); font-size:var(--t-lg); color:var(--text);
      margin-bottom:0.6rem; font-weight:500;
    }
    p {
      color:var(--muted); max-width:42ch; line-height:1.75;
      margin-bottom:2rem;
    }
    .glitch {
      animation: glitch 4s step-end infinite;
    }
    @keyframes glitch {
      0%, 90%, 100% { opacity:1; transform:none; }
      92% { opacity:0.8; transform:translate(-3px,1px); }
      94% { opacity:0.9; transform:translate(3px,-1px); }
      96% { opacity:0.85; transform:translate(-1px,2px); }
    }
    .btn {
      display:inline-flex; align-items:center; gap:0.4rem;
      padding:0.6rem 1.3rem; border-radius:var(--r-sm);
      font-size:var(--t-sm); font-weight:500; font-family:var(--sans);
      text-decoration:none; cursor:pointer;
      transition:transform 0.2s, box-shadow 0.2s;
    }
    .btn-primary {
      background:linear-gradient(135deg, var(--teal), #2db8b8);
      color:#08121e;
    }
    .btn-primary:hover {
      transform:translateY(-2px);
      box-shadow:0 6px 24px rgba(62,207,207,0.3);
    }
    .btn-secondary {
      background:transparent; color:var(--text);
      border:1px solid var(--border2);
    }
    .btn-secondary:hover {
      transform:translateY(-2px);
      border-color:var(--faint); background:rgba(255,255,255,0.04);
    }
    .links { display:flex; gap:0.65rem; flex-wrap:wrap; justify-content:center; }
    .term-cursor {
      display:inline-block; width:7px; height:13px;
      background:var(--teal); vertical-align:middle;
      animation:blink 1s step-end infinite; margin-left:2px;
    }
    @keyframes blink { 0%,100%{opacity:1}50%{opacity:0} }
    ::selection { background:rgba(62,207,207,0.18); }
    :focus-visible { outline:1.5px solid var(--teal); outline-offset:3px; border-radius:var(--r-sm); }
    @media (forced-colors: active) {
      .btn-primary { background:Highlight; color:HighlightText; }
    }
  </style>
</head>
<body>

  <div class="code"><span>&lt;</span>404<span>&gt;</span></div>
  <h1>Page not found</h1>
  <p>
    The page you're looking for doesn't exist, was moved,<br>
    or is having a bad terminal day.
  </p>
  <p style="font-family:var(--mono);font-size:var(--t-xs);color:var(--faint);margin-bottom:2rem;">
    $ which page<span class="term-cursor"></span>
  </p>
  <div class="links">
    <a href="/" class="btn btn-primary">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
      Back to home
    </a>
    <a href="/resume.pdf" download class="btn btn-secondary">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      R&eacute;sum&eacute;
    </a>
  </div>

</body>
</html>
